[pypi-dependencies]
#rdkit = ">=2025.3.5, <2026"
#rdkit = ">=2023.9.5, <2025.3.4"
numpy = "*"
pandas = ">=2.3.2, <3"
ase = ">=3.26.0, <4"
pre-commit = ">=4.3.0, <5"
confsweeper = {path = ".", editable = true}
isort = ">=6.0.1, <7"
black = ">=25.1.0, <26"
